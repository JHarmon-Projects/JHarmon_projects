<!DOCTYPE html>
<html>
    <head>
        <title>Docusign</title>
        <link rel="stylesheet" type="text/css" href="movement.css" media="screen" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.0/anime.min.js"></script> 
    </head>
    <body>


        <h1>Click</h1>

        <div>
            <img src="gooseMan.jpg" alt="Italian Trulli">
        </div>
     
        <div class="image-swap">
            <img src="gooseMan.jpg" alt="Italian Trulli">
            <img src="explosion.jpg" alt="no more Italian Trulli"/>
        </div>
        <script>
                    let animation = anime({
                        targets: "div",
                        translateX: 150,
                        height: "80px",
                        width: "80px",
                        duration: 2000,
                        easing: "linear",
                        direction: "alternate",
                        loop: true,
                        rotate: '10turn', // or 360
                        duration: 10000,
                        easing: 'linear'
                    });

        </script>
    </body>
</html>
